name: Build and Deploy Test

on:
  push:
    branches:
      - test
    paths:
      - "content/**"
      - "worklog/**"
      - "scripts/**"
      - "config/**"
      - "public/**"
      - "src/**"
      - "components/**"
      - "api/**"
      - "functions/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.*"
      - "tsconfig*.json"
      - "vercel.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-static-site
  cancel-in-progress: true

jobs:
  read-site-config:
    name: Read site config
    runs-on: ubuntu-latest
    outputs:
      github_actions_enabled: ${{ steps.read-flag.outputs.github_actions_enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read GitHub Actions flag
        id: read-flag
        shell: bash
        run: |
          value="$(grep -E '^github_actions_enabled:' config/site.yaml | head -n 1 | cut -d ':' -f 2- | xargs || true)"
          if [ "$value" = "false" ]; then
            echo "github_actions_enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Actions deployment is disabled in config/site.yaml"
          else
            echo "github_actions_enabled=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages:
    name: Deploy test branch to Cloudflare Pages
    needs: read-site-config
    if: ${{ needs.read-site-config.outputs.github_actions_enabled == 'true' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_VERSION: "22"
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
      SITE_URL: ${{ secrets.CLOUDFLARE_PAGES_TEST_URL }}
      ATTACHMENT_UPLOAD_THRESHOLD_MB: ${{ vars.ATTACHMENT_UPLOAD_THRESHOLD_MB != '' && vars.ATTACHMENT_UPLOAD_THRESHOLD_MB || '20' }}
      S3_PUBLIC_BASE_URL: ${{ secrets.S3_PUBLIC_BASE_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Validate Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_PROJECT_NAME" || (echo "Missing secret: CLOUDFLARE_PROJECT_NAME" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" || (echo "Missing secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" || (echo "Missing secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${{ secrets.CLOUDFLARE_PAGES_TEST_URL }}" || (echo "Missing secret: CLOUDFLARE_PAGES_TEST_URL" && exit 1)

      - name: Restore previous content snapshot from test preview
        run: |
          PAGES_URL="${{ secrets.CLOUDFLARE_PAGES_TEST_URL }}"
          mkdir -p public/generated
          SNAPSHOT_URL="$PAGES_URL/generated/content-data.json"
          TMP_FILE="$(mktemp)"
          chmod 600 "$TMP_FILE"
          trap "rm -f '$TMP_FILE'" EXIT

          if curl -fsSL -H 'Cache-Control: no-cache' "$SNAPSHOT_URL" -o "$TMP_FILE"; then
            if node -e "const fs=require('node:fs');const f=process.argv[1];const data=JSON.parse(fs.readFileSync(f,'utf8'));const n=Number(data?.totalNotices ?? (Array.isArray(data?.notices)?data.notices.length:NaN));if(!Number.isFinite(n)){process.exit(2)};console.log('Restored previous notices:',n);" "$TMP_FILE"; then
              mv "$TMP_FILE" public/generated/content-data.json
            else
              echo "::warning::Downloaded snapshot is not valid content-data.json, building from scratch"
              rm -f "$TMP_FILE"
            fi
          else
            echo "::warning::No previous content snapshot found on test preview, building from scratch"
            rm -f "$TMP_FILE"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upload oversized attachments
        run: node scripts/upload-large-attachments.mjs

      - name: Build dist
        env:
          ATTACHMENT_UPLOAD_THRESHOLD_MB: ${{ env.ATTACHMENT_UPLOAD_THRESHOLD_MB }}
          S3_PUBLIC_BASE_URL: ${{ env.S3_PUBLIC_BASE_URL }}
        run: pnpm run build


      - name: Sync remaining media to S3-compatible storage
        if: ${{ env.S3_BUCKET != '' }}
        run: node scripts/sync-media-to-s3.mjs

      - name: Verify build artifacts
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          test -s dist/index.html || (echo "dist/index.html is empty" && exit 1)

      - name: Prepare SPA fallback
        run: |
          cp dist/index.html dist/404.html
          if [ ! -f dist/_redirects ]; then
            echo "/* /index.html 200" > dist/_redirects
          fi

      - name: Deploy dist to Cloudflare Pages test branch
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=test
